  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px; line-height: 1.7; color: #24292f; background: #f6f8fa;
    }
    header {
      background: #0f172a; color: #e2e8f0; padding: 14px 32px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    header .logo { font-weight: 700; font-size: 15px; letter-spacing: .04em; color: #7dd3fc; text-decoration: none; }
    header .sep { color: #475569; }
    header .title { font-size: 13px; color: #94a3b8; }
    header .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    header .social-link { color: #64748b; display: flex; align-items: center; transition: color .15s; }
    header .social-link:hover { color: #e2e8f0; }
    header .dashboard-btn { background: #1d4ed8; color: #bfdbfe; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: .04em; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: background .15s; }
    header .dashboard-btn:hover { background: #2563eb; }
    main { max-width: 900px; margin: 40px auto; padding: 0 24px 80px; }
    .card { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 48px 56px; }
    .card h1 { font-size: 26px; font-weight: 700; color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 14px; margin-bottom: 8px; }
    .card blockquote { border-left: 4px solid #3b82f6; background: #eff6ff; color: #1e40af; padding: 12px 18px; border-radius: 0 6px 6px 0; margin: 20px 0; font-size: 13.5px; }
    .card blockquote strong { color: #1d4ed8; }
    .card h2 { font-size: 19px; font-weight: 700; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; margin: 36px 0 14px; }
    .card h3 { font-size: 15px; font-weight: 600; color: #1e293b; margin: 24px 0 10px; }
    .card h4 { font-size: 14px; font-weight: 600; color: #334155; margin: 18px 0 8px; }
    .card p { margin: 10px 0; }
    .card ul, .card ol { padding-left: 24px; margin: 8px 0; }
    .card li { margin: 4px 0; }
    .card li input[type="checkbox"] { margin-right: 6px; accent-color: #2563eb; pointer-events: none; }
    .card table { width: 100%; border-collapse: collapse; font-size: 13.5px; margin: 16px 0; }
    .card th { background: #f1f5f9; font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid #d0d7de; color: #374151; }
    .card td { padding: 7px 12px; border: 1px solid #e2e8f0; vertical-align: top; }
    .card tr:nth-child(even) td { background: #f8fafc; }
    .card pre { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; overflow-x: auto; font-size: 13px; margin: 14px 0; }
    .card code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 12.5px; }
    .card p code, .card li code, .card td code { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 5px; color: #be185d; }
    .card hr { border: none; border-top: 1px solid #e2e8f0; margin: 28px 0; }
    .card strong { color: #0f172a; }
    .card a { color: #2563eb; text-decoration: none; }
    .card a:hover { text-decoration: underline; }
    .card del { color: #94a3b8; }
    footer { text-align: center; color: #94a3b8; font-size: 12px; padding: 20px; }
    #loading { text-align: center; color: #94a3b8; padding: 60px 0; font-size: 14px; }
    @media (max-width: 640px) { .card { padding: 28px 20px; } header { padding: 12px 16px; } }
  </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({
    gfm: true,
    breaks: false,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  fetch('dba-azure-project.md?v=' + Date.now())
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      // Make task list checkboxes reflect checked state (read-only display)
      document.querySelectorAll('.card li input[type="checkbox"]').forEach(cb => {
        cb.disabled = true;
      });
      // Syntax highlight code blocks
      document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    })
    .catch(() => {
      document.getElementById('loading').textContent = 'Failed to load documentation.';
    });
</script>
